name: smoke

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install minimal test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wl-clipboard mpv pipx python3 shellcheck
          pipx install edge-tts
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Run ShellCheck
        run: shellcheck -x lib/common.sh bin/* install.sh uninstall.sh tests/smoke.sh
      - name: Run smoke tests
        run: ./tests/smoke.sh
